name: Deploy Static Hagenberg Game Jam Website to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: hagenberg-gamejam-at (Production)
    permissions:
      contents: read
      deployments: write
    env:
      # Opt into Node.js 24 for all actions (actions/checkout and cloudflare/wrangler-action
      # are still on Node 20; this bridges the gap until they update their runtimes).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup PHP 8.5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo
          coverage: none

      # Install dependencies via Composer
      # --ignore-platform-reqs might be needed if dependencies don't officially support 8.5 yet,
      # but standard install is safer if it passes.
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      # Build the static site using Hyde
      # GAMES_BASE_URL from Repository Variables (Settings → Actions → Variables)
      # Set to https://files.hagenberg-gamejam.at for R2 custom domain
      # Empty = same-origin /games/
      # SITE_URL and GAMEJAM_WEBSITE ensure canonical URLs and sitemap use production domain
      - name: Build Site
        run: php hyde build
        env:
          GAMES_BASE_URL: ${{ vars.GAMES_BASE_URL }}
          SITE_URL: https://hagenberg-gamejam.at
          GAMEJAM_WEBSITE: https://hagenberg-gamejam.at

      # Deploy the generated '_site' folder to Cloudflare Pages via Wrangler
      # Using cloudflare/wrangler-action (actively maintained) instead of the
      # abandoned cloudflare/pages-action (last release May 2023).
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=hagenberg-gamejam-at --branch=main
